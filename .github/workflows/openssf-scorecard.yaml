# policy, and support documentation.

name: "OpenSSF Scorecard"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#maintained
  schedule:
    - cron: "50 4 * * 0"
  push:
    branches: ["main", "master"]

# Declare default permissions as none.
permissions: {}

jobs:
  openssf-scorecard:
    name: "OpenSSF Scorecard"
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-openssf-scorecard.yaml@9b7880d03148ac73ba5f4e32d423b322db94ebc1  # v0.3.4
    permissions:
      # Needed to read repository contents (checkout, etc.).
      contents: read
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and obtain a Scorecard badge via OIDC.
      id-token: write
      # Uncomment the permission below if installing in a private repository.
      # actions: read
