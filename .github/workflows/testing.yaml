# Self-test: run this repository's composite action against its own
# workflow definitions. Uses the local action via './'.
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  self-audit:
    name: "Self audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # The self-test no longer uploads SARIF (see the audit step below), so
      # it needs only read access to the repository contents.
      contents: read
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@aa81113fe43792f29f939c79ea47a04801cf5342'  # v0.4.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: "Run zizmor audit"
        uses: "./"
        with:
          # The scheduled org-wide publisher (lfreleng-actions/.github
          # workflow zizmor-sarif-publish.yaml) is now the single source of
          # code-scanning SARIF for every repository, including this one. This
          # self-test only verifies the action runs end to end, so it must not
          # upload a second, competing analysis lineage to code scanning.
          upload-sarif: "false"
