# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Self-test: run this repository's composite action against its own
# workflow definitions. Uses the local action via './'.
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  self-audit:
    name: "Self audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      # upload-sarif reads workflow run info on private repositories.
      actions: read
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: "audit"

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: "Run zizmor audit"
        uses: "./"
        with:
          # yamllint disable-line rule:line-length
          upload-sarif: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
