version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(actions)"
    # Wait before opening a bump PR so we don't churn on a release that
    # gets retracted or superseded shortly after it ships.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15

  # zizmor version pin. pyproject.toml declares a single dependency
  # (zizmor) and uv.lock locks it; the reusable workflow reads the pinned
  # version from pyproject.toml at run time. The uv ecosystem keeps the
  # pin current, and because uv.lock is a real lockfile, version and
  # security updates resolve cleanly. Scheduled for Sunday evening UTC.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "Chore(deps)"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "zizmor"
