---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Example: per-repository opt-in caller.
#
# Copy this into a repository's .github/workflows/ to audit that
# repository on pull requests and to publish SARIF to code scanning on
# default-branch pushes. The single job holds `security-events: write`,
# used by the action's upload step on default-branch pushes.
#
# Pin the action to a commit SHA and record the version in a comment.

name: '🌈 Zizmor Scan'

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:

permissions: {}

jobs:
  zizmor:
    name: 'Audit workflows'
    if: >-
      github.event_name != 'push'
      || github.ref_name == github.event.repository.default_branch
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 'Harden runner'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository under audit'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: 'Run zizmor audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/zizmor-scan-action@0000000000000000000000000000000000000000  # vX.Y.Z
        with:
          # yamllint disable-line rule:line-length
          upload-sarif: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
